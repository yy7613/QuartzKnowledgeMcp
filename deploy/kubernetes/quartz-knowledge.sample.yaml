apiVersion: v1
kind: Namespace
metadata:
  name: quartz-knowledge
---
apiVersion: v1
kind: Secret
metadata:
  name: quartz-knowledge-secrets
  namespace: quartz-knowledge
type: Opaque
stringData:
  api-key: change-me-before-deploy
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quartz-knowledge-data
  namespace: quartz-knowledge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quartz-knowledge-mcp
  namespace: quartz-knowledge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quartz-knowledge-mcp
  template:
    metadata:
      labels:
        app: quartz-knowledge-mcp
    spec:
      containers:
        - name: api
          image: ghcr.io/example/quartz-knowledge-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Container
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__KnowledgeStore
              value: Data Source=/data/quartz-knowledge.db
            - name: Authentication__ApiKey__Enabled
              value: "true"
            - name: Authentication__ApiKey__HeaderName
              value: X-QuartzKnowledge-Api-Key
            - name: Authentication__ApiKey__ApiKey
              valueFrom:
                secretKeyRef:
                  name: quartz-knowledge-secrets
                  key: api-key
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quartz-knowledge-data
---
apiVersion: v1
kind: Service
metadata:
  name: quartz-knowledge-mcp
  namespace: quartz-knowledge
spec:
  selector:
    app: quartz-knowledge-mcp
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP